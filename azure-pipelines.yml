variables:
  buildConfiguration: 'Debug'
  netSdkVersion: '10.x'

jobs:
- job: BuildAndRunCodeAnalysis
  displayName: Build and run code analysis
  pool:
    vmImage: windows-latest
  steps:
  - task: UseDotNet@2
    displayName: Set up .NET SDK
    inputs:
      version: $(netSdkVersion)
  - task: DotNetCoreCLI@2
    displayName: Build solution with code analysis
    inputs:
      command: build
      projects: '**\*.csproj'
      arguments: -c $(buildConfiguration) -warnaserror

- job: RunTests
  displayName: Run tests
  pool:
    vmImage: windows-latest
  steps:
  - task: UseDotNet@2
    displayName: Set up .NET SDK
    inputs:
      version: $(netSdkVersion)
  - task: DotNetCoreCLI@2
    displayName: Run tests
    timeoutInMinutes: 20
    inputs:
      command: test
      projects: '**\*.csproj'
      arguments: -c $(buildConfiguration) -s "azure-pipelines.runsettings" -p:RunAnalyzers=false
